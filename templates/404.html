<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | AvaPharma</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 480px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #f59e0b;
      line-height: 1;
    }
    h1 { font-size: 1.5rem; margin: 1rem 0 .5rem; }
    p  { color: #64748b; line-height: 1.6; }
    a  {
      display: inline-block;
      margin-top: 2rem;
      padding: .6rem 1.5rem;
      background: #0ea5e9;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Go back home</a>
  </div>
</body>
</html>
