name: Deploy Backend

on:
  push:
    branches:
      - develop
      - main
      - master
  workflow_dispatch:

jobs:
  checks:
    name: Django checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: avapharmacy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key
      FIELD_ENCRYPTION_KEY: ""
      DATABASE_NAME: avapharmacy_test
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DJANGO_SETTINGS_MODULE: avapharmacy.settings.development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

  deploy-staging:
    name: Deploy staging
    needs: checks
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://app-staging.avapharmacy.co.ke
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Deploy to staging Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            /home/ava/deploy-staging-backend.sh

  deploy-production:
    name: Deploy production
    needs: checks
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app-production.avapharmacy.co.ke
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to production Droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            PRODUCTION_BRANCH=${{ github.ref_name }} /home/ava/deploy-production-backend.sh
