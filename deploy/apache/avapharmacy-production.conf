<VirtualHost *:80>
    ServerName app-production.avapharmacy.co.ke

    ErrorLog ${APACHE_LOG_DIR}/avapharmacy-production-error.log
    CustomLog ${APACHE_LOG_DIR}/avapharmacy-production-access.log combined

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass /static/ !
    ProxyPass /media/ !
    ProxyPass / http://127.0.0.1:8002/
    ProxyPassReverse / http://127.0.0.1:8002/

    Alias /static/ /home/ava/production/backend/staticfiles/
    <Directory /home/ava/production/backend/staticfiles/>
        Require all granted
    </Directory>

    Alias /media/ /home/ava/production/backend/media/
    <Directory /home/ava/production/backend/media/>
        Require all granted
    </Directory>
</VirtualHost>
