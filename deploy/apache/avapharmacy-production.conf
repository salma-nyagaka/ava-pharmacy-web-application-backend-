<VirtualHost *:80>
    ServerName app-production.avapharmacy.co.ke
    ServerAlias api-production.avapharmacy.co.ke

    ErrorLog ${APACHE_LOG_DIR}/avapharmacy-production-error.log
    CustomLog ${APACHE_LOG_DIR}/avapharmacy-production-access.log combined

    RequestHeader set X-Forwarded-Proto "https"

    Alias /static/ /home/ava/production/backend/staticfiles/
    <Directory /home/ava/production/backend/staticfiles/>
        Require all granted
    </Directory>

    Alias /media/ /home/ava/production/backend/media/
    <Directory /home/ava/production/backend/media/>
        Require all granted
    </Directory>

    WSGIDaemonProcess avapharmacy_production \
        python-home=/home/ava/production/backend/venv \
        python-path=/home/ava/production/backend \
        home=/home/ava/production/backend \
        user=ava \
        group=www-data \
        processes=2 \
        threads=15 \
        display-name=%{GROUP}
    WSGIProcessGroup avapharmacy_production
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptAlias / /home/ava/production/backend/avapharmacy/wsgi.py

    <Directory /home/ava/production/backend/avapharmacy>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>
</VirtualHost>
