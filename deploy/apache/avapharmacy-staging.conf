<VirtualHost *:80>
    ServerName api-staging.avapharmacy.co.ke

    ErrorLog ${APACHE_LOG_DIR}/avapharmacy-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/avapharmacy-staging-access.log combined

    RequestHeader set X-Forwarded-Proto "https"

    Alias /static/ /home/ava/staging/backend/staticfiles/
    <Directory /home/ava/staging/backend/staticfiles/>
        Require all granted
    </Directory>

    Alias /media/ /home/ava/staging/backend/media/
    <Directory /home/ava/staging/backend/media/>
        Require all granted
    </Directory>

    WSGIDaemonProcess avapharmacy_staging \
        python-home=/home/ava/staging/backend/venv \
        python-path=/home/ava/staging/backend \
        home=/home/ava/staging/backend \
        user=ava \
        group=www-data \
        processes=2 \
        threads=15 \
        display-name=%{GROUP}
    WSGIProcessGroup avapharmacy_staging
    WSGIApplicationGroup %{GLOBAL}
    WSGIScriptAlias / /home/ava/staging/backend/avapharmacy/wsgi.py

    <Directory /home/ava/staging/backend/avapharmacy>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>
</VirtualHost>
