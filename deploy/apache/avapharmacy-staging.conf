<VirtualHost *:80>
    ServerName app-staging.avapharmacy.co.ke

    ErrorLog ${APACHE_LOG_DIR}/avapharmacy-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/avapharmacy-staging-access.log combined

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass /static/ !
    ProxyPass /media/ !
    ProxyPass / http://127.0.0.1:8001/
    ProxyPassReverse / http://127.0.0.1:8001/

    Alias /static/ /home/ava/staging/backend/staticfiles/
    <Directory /home/ava/staging/backend/staticfiles/>
        Require all granted
    </Directory>

    Alias /media/ /home/ava/staging/backend/media/
    <Directory /home/ava/staging/backend/media/>
        Require all granted
    </Directory>
</VirtualHost>
